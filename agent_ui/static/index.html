<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Falcon Agentic UI</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

    <div class="main-container">
        <div class="video-wrapper">
            <video id="webcam" autoplay playsinline muted></video>
            <canvas id="overlay"></canvas>
            
            <div id="status-badge" class="tracking-badge hidden">
                <span class="pulsing-dot"></span>
                Tracking: <strong id="tracking-target">None</strong>
            </div>
        </div>

        <div class="controls-panel glass-panel">
            <div id="audio-pill" class="audio-pill hidden">
                <i data-lucide="mic"></i>
                <span class="audio-text">Audio Prompt Ready</span>
                <button id="remove-audio-btn" title="Remove audio"><i data-lucide="x"></i></button>
            </div>
            
            <div class="input-area">
                <input type="text" id="prompt-input" placeholder="Type what you want to find...">
                
                <button id="record-btn" class="icon-btn" title="Hold to record audio">
                    <i data-lucide="mic"></i>
                </button>

                <button id="send-btn" class="primary-btn">
                    <i data-lucide="send"></i>
                    <span>Send</span>
                </button>
                
                <button id="stop-btn" class="danger-btn hidden">
                    <i data-lucide="square"></i>
                    <span>Stop</span>
                </button>
            </div>
        </div>
    </div>

    <script src="main.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
